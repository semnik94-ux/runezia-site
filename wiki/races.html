        html += `<div class="race-grid">`;
        group.races.forEach(r => {
          const color = RUNE_COLORS[r.rune] || '#555';
          const runeFamilyKey = r.rune;
          html += `<div class="race-card">`;
          html += `<div class="rc-header"><span class="rc-name">${r.name}</span>`;
          if (r.rune !== '—') {
            html += `<span class="rune-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;"><a href="runes.html" class="rune-link" style="color:${color}">${r.rune}</a></span>`;

          // Stats
          html += `<div class="rc-stats">`;
          const statLabels = ['СИЛА','ЛОВК','ВЫН','ИНТ','МДР','ХАР'];

            const val = r.stats[s] || 0;
            const cls = val > 0 ? 'stat-positive' : val < 0 ? 'stat-negative' : 'stat-neutral';

            html += `<div class="rc-stat"><span class="val ${cls}">${sign}${val}</span><span class="lbl">${s}</span></div>`;

          html += `</div></div>`;
        });
        html += `</div></div>`;

      container.innerHTML = html;
